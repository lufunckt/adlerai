<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adler AI | Assistente Clínico</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:italic&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: rgba(25, 25, 25, 0.8);
            --accent-blue: #4a90e2;
            --accent-green: #50e3c2;
            --accent-warm: #f5a623;
            --text-main: #e0e0e0;
            --text-dim: #888;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Layout */
        .app-container {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            height: 100vh;
        }

        /* Sidebar Esquerda */
        .sidebar {
            background: var(--panel-bg);
            border-right: 1px solid #222;
            padding: 20px;
            z-index: 10;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 40px;
            background: linear-gradient(45deg, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .config-group { margin-bottom: 25px; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 1px; }
        select {
            width: 100%; background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 10px; border-radius: 5px; cursor: pointer;
        }

        /* Área Central (O Mapa) */
        .canvas-area {
            position: relative;
            cursor: grab;
        }

        #neural-map { width: 100%; height: 100%; }

        /* Sidebar Direita (Insights) */
        .context-panel {
            background: var(--panel-bg);
            border-left: 1px solid #222;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .insight-card {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 3px solid var(--accent-blue);
        }

        .insight-card h4 { margin: 0 0 10px 0; font-size: 14px; color: var(--accent-blue); }
        .insight-card p { margin: 0; font-size: 13px; line-height: 1.5; color: #bbb; }

        /* Timeline Scrubber */
        .timeline-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            background: rgba(20, 20, 20, 0.9);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        input[type=range] { flex-grow: 1; accent-color: var(--accent-blue); }

        /* Estilo dos Nós */
        .node { stroke: #000; stroke-width: 1.5px; cursor: pointer; transition: 0.3s; }
        .link { stroke: #333; stroke-opacity: 0.4; stroke-width: 1px; }
        .label { font-size: 10px; fill: #aaa; pointer-events: none; text-transform: uppercase; }

    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo">Adler AI</div>
        
        <div class="config-group">
            <label>Paciente</label>
            <select>
                <option>Gabriel M. (TDAH)</option>
                <option>Ana P. (Ansiedade)</option>
            </select>
        </div>

        <div class="config-group">
            <label>Abordagem Clínica</label>
            <select id="modeSelect" onchange="updateSystem()">
                <option value="tcc">TCC (Foco em Gatilhos)</option>
                <option value="psic">Psicanálise (Foco em Origem)</option>
                <option value="esq">Terapia do Esquema</option>
            </select>
        </div>

        <div style="margin-top: 50px; font-size: 11px; color: #555;">
            Sessões Analisadas: 14<br>
            Última atualização: Hoje, 09:42
        </div>
    </aside>

    <main class="canvas-area">
        <svg id="neural-map"></svg>
        
        <div class="timeline-container">
            <span style="font-size: 12px; color: #666;">JAN</span>
            <input type="range" min="1" max="100" value="85">
            <span style="font-size: 12px; color: var(--accent-blue);">HOJE</span>
        </div>
    </main>

    <section class="context-panel">
        <label>Insights da IA (Adler)</label>
        
        <div class="insight-card">
            <h4>Padrão Detectado</h4>
            <p id="insightText">A correlação entre o nó 'Trabalho' e 'Insônia' aumentou 40% na última semana.</p>
        </div>

        <div class="insight-card" style="border-left-color: var(--accent-green);">
            <h4>Efeito Medicamentoso</h4>
            <p>A introdução do nó 'Venvanse' reduziu a dispersão dos nós periféricos de atenção.</p>
        </div>
    </section>
</div>

<script>
    const width = window.innerWidth - 600;
    const height = window.innerHeight;

    const svg = d3.select("#neural-map")
        .attr("viewBox", [0, 0, width, height]);

    let nodes = [
        { id: "Paciente", group: 1, radius: 20 },
        { id: "Insônia", group: 2, radius: 12 },
        { id: "Trabalho", group: 2, radius: 10 },
        { id: "Venvanse", group: 3, radius: 15 },
        { id: "Foco", group: 3, radius: 8 },
        { id: "Infância", group: 4, radius: 10 },
        { id: "Mãe", group: 4, radius: 8 }
    ];

    let links = [
        { source: "Paciente", target: "Insônia" },
        { source: "Paciente", target: "Trabalho" },
        { source: "Insônia", target: "Trabalho" },
        { source: "Paciente", target: "Venvanse" },
        { source: "Venvanse", target: "Foco" },
        { source: "Paciente", target: "Infância" },
        { source: "Infância", target: "Mãe" }
    ];

    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(150))
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(width / 2, height / 2));

    const link = svg.append("g")
        .attr("class", "links")
        .selectAll("line")
        .data(links)
        .enter().append("line")
        .attr("class", "link");

    const node = svg.append("g")
        .attr("class", "nodes")
        .selectAll("circle")
        .data(nodes)
        .enter().append("circle")
        .attr("class", "node")
        .attr("r", d => d.radius)
        .attr("fill", d => {
            if(d.group === 1) return "#fff";
            if(d.group === 2) return "var(--accent-warm)";
            if(d.group === 3) return "var(--accent-blue)";
            return "#555";
        })
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));

    const text = svg.append("g")
        .selectAll("text")
        .data(nodes)
        .enter().append("text")
        .attr("class", "label")
        .text(d => d.id)
        .attr("dx", 15)
        .attr("dy", 4);

    simulation.on("tick", () => {
        link.attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node.attr("cx", d => d.x)
            .attr("cy", d => d.y);
        
        text.attr("x", d => d.x)
            .attr("y", d => d.y);
    });

    function updateSystem() {
        const mode = document.getElementById('modeSelect').value;
        const insight = document.getElementById('insightText');
        
        if(mode === 'psic') {
            insight.innerText = "Foco em associações livres: O nó 'Mãe' apresenta conexões latentes com o comportamento agressivo no 'Trabalho'.";
            node.transition().duration(1000).attr("fill", d => d.group === 4 ? "var(--accent-warm)" : "#333");
        } else if(mode === 'tcc') {
            insight.innerText = "Gatilhos identificados: O nó 'Trabalho' está disparando o nó 'Insônia' via pensamentos automáticos negativos.";
            node.transition().duration(1000).attr("fill", d => d.group === 2 ? "var(--accent-warm)" : "#333");
        }
    }

    function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fcy = event.subject.y;
    }
    function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
    }
    function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
    }
</script>

</body>
</html>
